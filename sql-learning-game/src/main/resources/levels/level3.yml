id: level-3
title: Multi-Condition Search
difficulty: beginner
objective: Combine WHERE predicates.
prompt: Return product names where stock is below 50 and price is above 100.
xp: 120
orderMatters: false
allowedCommands: ["SELECT"]
hints:
  - "Use AND between conditions"
seedSql: |
  CREATE TABLE products (id INT PRIMARY KEY, name VARCHAR(100), stock INT, price DECIMAL(10,2));
  INSERT INTO products VALUES (1, 'GPU', 12, 699.00);
  INSERT INTO products VALUES (2, 'Mouse', 200, 49.00);
  INSERT INTO products VALUES (3, 'SSD', 35, 129.00);
expectedQuery: "SELECT name FROM products WHERE stock < 50 AND price > 100;"
