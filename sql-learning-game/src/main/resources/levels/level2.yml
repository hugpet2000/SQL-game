id: level-2
title: Filter High Value Orders
difficulty: beginner
objective: Use WHERE and comparison operators.
prompt: Show order_id and total for orders above 500.
xp: 110
orderMatters: false
allowedCommands: ["SELECT"]
hints:
  - "Use WHERE total > 500"
seedSql: |
  CREATE TABLE orders (order_id INT PRIMARY KEY, customer_id INT, total DECIMAL(10,2));
  INSERT INTO orders VALUES (1001, 1, 199.99);
  INSERT INTO orders VALUES (1002, 1, 899.00);
  INSERT INTO orders VALUES (1003, 2, 550.50);
expectedQuery: "SELECT order_id, total FROM orders WHERE total > 500;"
