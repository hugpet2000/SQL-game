id: level-8
title: Debug Broken Join
difficulty: advanced
objective: Repair mission query logic.
objectiveCue: Join + aggregate together for per-user activity.
prompt: Return each username with post_count, but only for users who have posts.
explanationSnippet: Combining JOIN + COUNT + GROUP BY yields compact activity summaries.
encouragement: Clean fix—this is a classic “count related records” query shape.
xp: 200
orderMatters: false
allowedCommands:
- SELECT
hints:
- JOIN users u to posts p on u.id = p.user_id
- COUNT(p.id) AS post_count and GROUP BY u.username
- Use inner JOIN to naturally exclude users with zero posts
seedSql: 'CREATE TABLE users (id INT PRIMARY KEY, username VARCHAR(100));

  CREATE TABLE posts (id INT PRIMARY KEY, user_id INT, body VARCHAR(255));

  INSERT INTO users VALUES (1, ''neo'');

  INSERT INTO users VALUES (2, ''trinity'');

  INSERT INTO posts VALUES (1, 1, ''Hi'');

  INSERT INTO posts VALUES (2, 1, ''Again'');

  INSERT INTO posts VALUES (3, 2, ''Yo'');

  '
expectedQuery: SELECT u.username, COUNT(p.id) AS post_count FROM users u JOIN posts p ON u.id = p.user_id GROUP BY u.username;
