id: level-14
title: Anti-Join - Products Never Sold
difficulty: advanced
objective: Use NOT EXISTS to find dimension rows with no fact matches.
objectiveCue: 'Ramp again: use anti-join logic to find missing relationships.'
prompt: 'Practice loop: (1) list products, (2) add NOT EXISTS against order_items, (3) keep only products never sold.'
explanationSnippet: NOT EXISTS is a reliable anti-join that avoids NULL pitfalls from NOT IN.
encouragement: Strong anti-join execution—“find what never happened” is a high-value analysis skill.
xp: 340
orderMatters: false
allowedCommands:
- SELECT
hints:
- 'Pass 1: start from products p'
- 'Pass 2: correlated subquery checks oi.product_id = p.id'
- 'Pass 3: WHERE NOT EXISTS (SELECT 1 FROM order_items oi WHERE oi.product_id = p.id)'
seedSql: 'CREATE TABLE products (id INT PRIMARY KEY, name VARCHAR(100));

  CREATE TABLE order_items (id INT PRIMARY KEY, product_id INT, quantity INT);

  INSERT INTO products VALUES (1, ''Laptop'');

  INSERT INTO products VALUES (2, ''Dock'');

  INSERT INTO products VALUES (3, ''Keyboard'');

  INSERT INTO products VALUES (4, ''Webcam'');

  INSERT INTO order_items VALUES (1, 1, 1);

  INSERT INTO order_items VALUES (2, 3, 2);

  '
expectedQuery: SELECT p.name FROM products p WHERE NOT EXISTS (SELECT 1 FROM order_items oi WHERE oi.product_id = p.id);
