id: level-15
title: Optimization Mindset - Aggregate the Right Slice
difficulty: boss
objective: Filter early and aggregate only relevant rows before sorting.
objectiveCue: 'Final boss: filter the right slice first, then aggregate and rank output.'
prompt: 'Practice loop: (1) keep only PAID orders in February 2026, (2) verify slice rows, (3) return customer_id + net_revenue sorted highest first.'
explanationSnippet: Early filtering reduces work before GROUP BY, yielding faster and clearer aggregates.
encouragement: Outstanding finish—slice-first aggregation is production-grade SQL thinking.
xp: 380
orderMatters: true
allowedCommands:
- SELECT
hints:
- 'Pass 1: WHERE status = ''PAID'' and created_on >= DATE ''2026-02-01'' and < DATE ''2026-03-01'''
- 'Pass 2: GROUP BY customer_id with SUM(amount) AS net_revenue'
- 'Pass 3: ORDER BY net_revenue DESC, customer_id ASC'
seedSql: 'CREATE TABLE orders (id INT PRIMARY KEY, customer_id INT, status VARCHAR(20), amount DECIMAL(10,2), created_on DATE);

  INSERT INTO orders VALUES (1, 10, ''PAID'', 120.00, DATE ''2026-02-02'');

  INSERT INTO orders VALUES (2, 10, ''PAID'', 80.00, DATE ''2026-02-21'');

  INSERT INTO orders VALUES (3, 11, ''PAID'', 150.00, DATE ''2026-02-10'');

  INSERT INTO orders VALUES (4, 11, ''CANCELLED'', 200.00, DATE ''2026-02-14'');

  INSERT INTO orders VALUES (5, 12, ''PAID'', 90.00, DATE ''2026-01-30'');

  INSERT INTO orders VALUES (6, 12, ''PAID'', 140.00, DATE ''2026-02-27'');

  '
expectedQuery: SELECT customer_id, SUM(amount) AS net_revenue FROM orders WHERE status = 'PAID' AND created_on >= DATE '2026-02-01' AND created_on < DATE '2026-03-01' GROUP BY customer_id ORDER BY net_revenue DESC, customer_id ASC;
