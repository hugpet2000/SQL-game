id: level-9
title: Inactive User Audit
difficulty: advanced
objective: Build correctness filter for state cleanup prep.
objectiveCue: Apply business-state filters precisely.
prompt: Return IDs of users who are inactive and not already archived.
explanationSnippet: Layered predicates keep only rows matching the exact cleanup policy.
encouragement: Nice precision—state-based filtering prevents risky over-selection.
xp: 215
orderMatters: false
allowedCommands:
- SELECT
hints:
- SELECT id FROM users
- Filter active = FALSE
- Also require status <> 'archived'
seedSql: 'CREATE TABLE users (id INT PRIMARY KEY, active BOOLEAN, status VARCHAR(20));

  INSERT INTO users VALUES (1, TRUE, ''ok'');

  INSERT INTO users VALUES (2, FALSE, ''old'');

  INSERT INTO users VALUES (3, FALSE, ''archived'');

  '
expectedQuery: SELECT id FROM users WHERE active = FALSE AND status <> 'archived';
